<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ontology Tree - Mouse Muscle Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #181b23;
      --bg-hover: #252a35;
      --bg-match: #1a2e1a;
      --bg-highlight: #1a2744;
      --border: #2d3548;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #5f6368;
      --accent: #4a9eff;
      --accent-hover: #6eb3ff;
      --radius: 6px;
      --transition: 0.15s ease;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 1.5rem 2rem 2rem;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .page-header {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .stats {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin: 0;
    }
    .search {
      margin-bottom: 1.25rem;
    }
    .search-wrap {
      display: inline-block;
      position: relative;
      max-width: 420px;
      width: 100%;
    }
    .search-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap:focus-within .search-icon { color: var(--accent); }
    .search input {
      width: 100%;
      padding: 0.625rem 1rem 0.625rem 2.5rem;
      font-size: 0.9375rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-primary);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search input::placeholder { color: var(--text-muted); }
    .search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
    }
    .tree {
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .node { margin: 0; }
    .node-header {
      cursor: pointer;
      padding: 0.375rem 0.625rem;
      margin: 0 -0.625rem;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background var(--transition), color var(--transition);
    }
    .node-header:hover { background: var(--bg-hover); }
    .node-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .node-header.match {
      background: var(--bg-match);
      color: #7bc97b;
      scroll-margin-top: 6rem;
    }
    .node-header.match .id { color: #8fd68f; }
    .node-header.highlight { background: var(--bg-highlight); }
    .toggle {
      width: 1.125rem;
      text-align: center;
      user-select: none;
      font-size: 0.65rem;
      color: var(--text-muted);
      transition: transform var(--transition), color var(--transition);
    }
    .node-header:hover .toggle { color: var(--text-secondary); }
    .toggle.empty { visibility: hidden; }
    .name { flex: 1; font-weight: 500; }
    .id {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .children {
      margin-left: 1.5rem;
      border-left: 1px solid var(--border);
      padding-left: 0.75rem;
      margin-top: 0;
    }
    .children.collapsed { display: none; }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>Ontology Tree</h1>
    <p class="stats">Loading...</p>
  </header>
  <div class="search">
    <label for="search" class="search-wrap">
      <svg class="search-icon" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search by name or ID (e.g. Brain, BAP_0012004)...">
    </label>
  </div>
  <div id="tree" class="tree"></div>

  <script>
    const ICON_EXPANDED = '\u25BC';  /* ▼ */
    const ICON_COLLAPSED = '\u25B6'; /* ▶ */

    let data = null;

    async function loadData() {
      const res = await fetch('ontology-tree.json');
      data = await res.json();
      document.querySelector('.stats').textContent = `${Object.keys(data.structures).length} structures`;
      renderTree(data.tree, document.getElementById('tree'));
    }

    function renderTree(nodes, container, depth = 0) {
      container.innerHTML = '';
      for (const node of nodes) {
        const div = document.createElement('div');
        div.className = 'node';
        const hasChildren = node.children && node.children.length > 0;
        const header = document.createElement('div');
        header.className = 'node-header';
        header.dataset.id = node.id;
        header.tabIndex = 0;
        const toggleSpan = document.createElement('span');
        toggleSpan.className = 'toggle' + (hasChildren ? '' : ' empty');
        toggleSpan.textContent = hasChildren ? ICON_EXPANDED : '';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'name';
        nameSpan.textContent = node.name;
        const idSpan = document.createElement('span');
        idSpan.className = 'id';
        idSpan.textContent = node.id;
        header.appendChild(toggleSpan);
        header.appendChild(nameSpan);
        header.appendChild(idSpan);
        if (node.definition) header.title = node.definition;
        div.appendChild(header);

        if (hasChildren) {
          const childrenDiv = document.createElement('div');
          childrenDiv.className = 'children' + (depth >= 2 ? ' collapsed' : '');
          renderTree(node.children, childrenDiv, depth + 1);
          div.appendChild(childrenDiv);
          if (depth >= 2) toggleSpan.textContent = ICON_COLLAPSED;

          header.addEventListener('click', () => {
            childrenDiv.classList.toggle('collapsed');
            toggleSpan.textContent = childrenDiv.classList.contains('collapsed') ? ICON_COLLAPSED : ICON_EXPANDED;
          });
        }

        container.appendChild(div);
      }
    }

    function collectNodes(container, list = []) {
      for (const h of container.querySelectorAll('.node-header')) {
        list.push({ el: h, name: data.structures[h.dataset.id]?.name || '', id: h.dataset.id });
      }
      return list;
    }

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const treeEl = document.getElementById('tree');
      const headers = treeEl.querySelectorAll('.node-header');
      let firstMatch = null;
      headers.forEach(h => {
        h.classList.remove('match', 'highlight');
        const name = (data.structures[h.dataset.id]?.name || '').toLowerCase();
        const id = (h.dataset.id || '').toLowerCase();
        if (!q) {
          h.closest('.children')?.classList.remove('collapsed');
          h.closest('.node')?.querySelector('.toggle')?.classList.remove('empty');
          const t = h.querySelector('.toggle');
          if (t && !t.classList.contains('empty')) t.textContent = ICON_EXPANDED;
        } else if (name.includes(q) || id.includes(q)) {
          h.classList.add('match');
          if (!firstMatch) firstMatch = h;
          h.closest('.children')?.classList.remove('collapsed');
          let p = h.closest('.children');
          while (p) {
            p.classList.remove('collapsed');
            const prevToggle = p.previousElementSibling?.querySelector('.toggle');
            if (prevToggle && !prevToggle.classList.contains('empty')) prevToggle.textContent = ICON_EXPANDED;
            p = p.closest('.node')?.parentElement?.closest('.children');
          }
        }
      });
      if (firstMatch) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const rect = firstMatch.getBoundingClientRect();
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const targetY = scrollTop + rect.top - 80;
            window.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
          });
        });
      }
    });

    loadData().catch(err => {
      document.querySelector('.stats').textContent = 'Failed to load ontology-tree.json. Run: python scripts/owl_to_tree.py';
      console.error(err);
    });
  </script>
</body>
</html>
